apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-demo-app
spec:
  replicas: 2

  selector:
    matchLabels:
      app: eks-demo-app

  template:
    metadata:
      labels:
        app: eks-demo-app

    spec:
      containers:
      - name: eks-demo-app

        image: 367012942858.dkr.ecr.us-east-1.amazonaws.com/eks-demo-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
